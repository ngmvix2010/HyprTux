# BACKGROUND
background {
    monitor =
    path = /usr/share/pentaxium/skel/hypr/pentaxium/lockscreen.png
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# INPUT FIELD
input-field {
    monitor =
    size = 140, 36
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.6)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Inter 11
    placeholder_text = <i><span foreground="##ffffff99">Enter Pass</span></i>
    hide_input = false
    position = 0, -325
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span letter_spacing='4500'>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 74
    font_family = Inter Bold
    position = 0, 240
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 17
    font_family = Inter SemiBold
    position = 0, 300
    halign = center
    valign = center
}

# Profie-Photo
image {
    monitor =
    path = /home/$USER/.config/hypr/$USER.jpg
    border_color = 0xffdddddd
    border_size = 0
    size = 80
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -210
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hi, $USER
    color = rgba(216, 222, 233, 0.70)
    font_size = 14
    font_family = Inter SemiBold
    position = 0, -280
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/Scripts/songdetail.sh)" 
    color = rgba(255, 255, 255, 0.7)
    font_size = 10
    font_family = Inter SemiBold
    position = 0, 10
    halign = center
    valign = bottom
}
